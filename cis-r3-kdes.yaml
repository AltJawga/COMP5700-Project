chain_of_thought_kdes:
  element1:
    name: CIS Benchmarks
    requirements:
    - Use CIS Benchmarks for hardening systems.
    - Carefully consider exceptions to specific Recommendations.
    - Thoroughly test configuration changes with representative lab systems.
    - Test configuration changes with representative lab systems.
    - Iteratively deploy to additional systems and monitor closely for issues.
  element2:
    name: Establish Secure Configurations
    requirements:
    - Establish Secure Configurations
  element3:
    name: Enable API Server Audit Logs
    requirements:
    - api_server_audit_logs_enabled
    - enable_audit_logging
    - establish_audit_log_management_process
    - enable_audit_logging
    - enable_audit_logging
    - enable_audit_logging
    - enable_audit_logging
    - enable_audit_logging
    - enable_audit_logging
    - enable_audit_logging
  element4:
    name: Audit Logging
    requirements:
    - Verify audit logging is enabled for Kubernetes components
    - Ensure the audit logs are being collected and sent to a centralized logging
      system
    - "Verify that the audit logs are being monitored and managed according to the\
      \ enterprise\u2019s audit log management process"
    - Create or update the audit-policy.yaml to specify the audit logging configuration
    - Apply the audit policy configuration to the cluster
    - Ensure audit logs are forwarded to a centralized logging system
  element5:
    name: kubelet file ownership
    requirements:
    - Set kubelet file ownership to root:root
    - Restrict the kubeconfig file permissions
  element6:
    name: Configure Data Access Control Lists (ACLs)
    requirements:
    - "Configure data access control lists (ACLs) based on a user\u2019s need to know."
    - "Apply data \u25CF \u25CF \u25CF access control lists, also known as access\
      \ permissions, to local and remote file systems, databases, and applications."
  element7:
    name: Authorization Mode
    requirements:
    - set to Webhook
    description: The Authorization Mode is set to Webhook.
  element8:
    name: Secure Network Management Protocols
    requirements:
    - Use secure network management protocols (e.g., 802.1X, WPA2)
    - Ensure only approved ports, protocols, and services are running.
  element9:
    name: RotateKubeletServerCertificate
    requirements:
    - Configure detailed audit logging for enterprise assets containing sensitive
      data.
    - Ensure that local logging has been enabled on all systems and networking devices.
    - Enable kubelet client certificate rotation.
    - Encrypt sensitive data in transit.
  element10:
    name: Encrypt Sensitive Data in Transit
    requirements:
    - Implement TLS and Open Secure Shell (OpenSSH) for transport layer security.
  element11:
    name: Minimize wildcard use in Roles and ClusterRoles
    requirements:
    - Reduce the use of wildcards in Roles and ClusterRoles
  element12:
    name: Cluster Access Manager API
    requirements:
    - Simplified access management
    - Enhanced security
    - Improved visibility
    - Enhanced compliance
  element13:
    name: Access Control
    requirements:
    - Limit privileged containers
    - Enforce access control to data
    - Use Pod Security Standards
    - Minimize the admission of privileged containers
  element14:
    name: Pod Security Policy
    requirements:
    - Restrict administrator privileges to dedicated administrator accounts
    - Avoid sharing the host PID namespace
    - Exclude namespaces with user workloads
    - Restrict the admission of containers wishing to share the host IPC namespace
  element15:
    name: Restrict Administrator Privileges to Dedicated Administrator Accounts
    requirements:
    - Do not generally permit containers to be run with the allowPrivilegeEscalation
      flag set to true.
    - Ensure that all users with administrative account access use a dedicated or
      secondary account for elevated activities.
    - "Restrict administrator privileges to dedicated administrator accounts on \u25CF\
      \ \u25CF \u25CF enterprise assets."
    - "Conduct general computing activities, such as internet browsing, email, and\
      \ productivity suite use, from the user\u2019s primary, non-privileged account."
    - Ensure that all users with administrative account access use a dedicated or
      secondary account for elevated activities. This account should only be used
      for administrative activities and not internet browsing, email, or similar activities.
  element16:
    name: Restrict Administrator Privileges to Dedicated Administrator Accounts
    requirements:
    - Restrict Administrator Privileges to Dedicated Administrator Accounts
    description: Restricts administrator privileges to dedicated administrator accounts.
  element17:
    name: Encryption at Rest
    requirements:
    - Secondary authentication mechanism not integrated into the operating system
    - Encryption of sensitive data at rest on servers, applications, and databases
      containing sensitive data.
  element18:
    name: Image Scanning and Vulnerability Management
    requirements:
    - Level 1: Automated Image Scanning
      requirement: Scan images being deployed to Amazon EKS for vulnerabilities.
    - Level 1: Vulnerability Scanning
      requirement: Perform automated vulnerability scans of internal enterprise assets.
    - Level 1: Image Scanning of External Systems
      requirement: Perform automated vulnerability scans of externally-exposed enterprise
        assets.
    - Level 1: Undefined Severity Level
      requirement: Receive a scan finding that has a severity level of UNDEFINED.
    - Level 1: UnsupportedImageError
      requirement: You may get an UnsupportedImageError error when attempting to scan
        an image that was built using an operating system that Amazon ECR doesn't
        support image scanning for.
    - Level 1: Limited Access to Amazon ECR
      requirement: Perform scans on a monthly, or more frequent, basis.
    - Level 1: Manual Access Control
      requirement: Run Automated Vulnerability Scanning Tools
    - Level 1: IAM Access Management
      requirement: Utilize an up-to-date SCAP-compliant vulnerability scanning tool
        to automatically scan all systems on the network on a weekly or more frequent
        basis to identify all potential vulnerabilities on the organization's systems.
    - Level 1: IAM Access Management
      requirement: Perform authenticated vulnerability scanning with agents running
        locally on each system or with remote scanners configured with elevated rights
        on the system being tested.
  element19:
    name: Restrict Administrator Privileges to Dedicated Administrator Accounts v8
    requirements:
    - "Restrict administrator privileges to dedicated administrator accounts on \u25CF\
      \ \u25CF \u25CF enterprise assets."
    - "Conduct general computing activities, such as internet browsing, email, and\
      \ productivity suite use, from the user\u2019s primary, non-privileged account."
    - "Ensure that all users with administrative account access use a dedicated or\
      \ \u25CF \u25CF \u25CF secondary account for elevated activities."
    - Use approved container registries.
  element20:
    name: Establish and Maintain Dedicated Computing Resources for All Administrative
      Work
    requirements:
    - Establish and maintain dedicated computing resources, either physically or logically
      separated, for all administrative tasks or tasks requiring administrative access.
  element21:
    name: Encryption at Rest
    requirements:
    - Kubernetes secrets are stored with Base64 encoding, but encrypting is the recommended
      approach.
    - Use AWS Key Management Service (KMS) keys to provide envelope encryption of
      Kubernetes secrets stored in Amazon EKS.
    - "Restrict Access to the Control Plane Endpoint (Automated) Profile Applicability:\
      \ \u2022 Level 1 Description: Enable Endpoint Private Access to restrict access\
      \ to the cluster\u2019s control plane to only an allowlist of authorized IPs."
    - By enabling private endpoint access to the Kubernetes API server, all communication
      between your nodes and the API server stays within your VPC.
    - You can set this restriction by specifying an authorized network.
    - 'Check for the following to be ''enabled: true'' Page 129 Internal Only - General
      5.4 Cluster Networking'
  element22:
    name: Endpoint Configuration
    requirements:
    - Disable public access to the cluster endpoint
    - Require private endpoint access
    - Configure private node IP ranges
    - Enable a virtual firewall on servers
    - Enforce network-based URL filters
    - Disable public IP addresses for cluster nodes
    - Configure private node IP ranges
    - Disable public IP addresses for cluster nodes
    - Restrict access to the control plane endpoint
  element23:
    name: Use aws eks create-nodegroup with only private subnets
    requirements:
    - Use aws eks create-nodegroup with only private subnets
  element24:
    name: RBAC and Service Accounts
    requirements:
    - Define and maintain role-based access control
    - Perform access control reviews of enterprise assets
    - Minimize access to secrets
    - Minimize wildcard use in Roles and ClusterRoles
    - Minimize access to create pods
    - Ensure default service accounts are not actively used.
  element25:
    name: Minimize the admission of privileged containers
    requirements:
    - Limit the ability of containers to run with elevated privileges
    description: Restricts container access to the host process ID namespace.
  element26:
    name: Minimize Admission of Privileged Containers
    requirements:
    - Minimize the admission of containers with allowPrivilegeEscalation
    - Minimize the admission of containers wishing to share the host process ID namespace
    - Minimize the admission of containers wishing to share the host IPC namespace
    - Minimize the admission of containers wishing to share the host network namespace
    - Minimize the admission of containers with allowPrivilegeEscalation
