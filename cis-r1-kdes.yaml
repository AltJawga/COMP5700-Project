  element3:
    name: Establish Secure Configurations
    requirements:
    - Establish Secure Configurations
    - Implement Secure Configurations
  element4:
    name: Worker Node Configuration Files
    requirements:
    - Ensure that the kubeconfig file permissions are set to 644 or more restrictive
    - Restrict the file permissions to maintain the integrity of the file
    - The file should be writable by only the administrators on the system
    - In this case, there is no proxy kubeconfig file.
    - 'Run the following command on each node to find the appropriate kubeconfig file:'
  element5:
    name: kubelet-config.json
    requirements:
    - Ensure permissions are 644 or more restrictive
    - Ensure ownership is set to root:root
    audit:
    - ssh to worker nodes
    - stat -c %U:%G /etc/kubernetes/kubelet/kubelet-config.json
    - chmod 644 /etc/kubernetes/kubelet/kubelet-config.json
    defaultValue: See the AWS EKS documentation for the default value.
    references:
    - https://kubernetes.io/docs/admin/kube-proxy/
    - CIS Controls: Controls Control IG 1 IG 2 IG 3 Version 3.3
  element6:
    name: Kubelet Service Management
    requirements:
    - Disable Dormant Accounts
    - Delete or Disable Dormant Accounts
    - Ensure that the --authorization-mode argument is not set to AlwaysAllow
    - Restrict this behavior and only allow explicitly authorized requests
    - Enable Webhook Authentication
    - Verify that the Authorization Mode is set to Webhook
    - Enable Webhook Authentication
    - Restrict Administrator Privileges to Dedicated Administrator Accounts
    - Change Default Passwords
  element7:
    name: Protect Kernel Defaults
    requirements:
    - 'true'
    - 'true'
    - 'true'
    audit:
    - SSH to each node
    - ps -ef | grep kubelet
    - Verify --make-iptables-util-chains:true
    - Verify --hostname-override argument does not exist
    - Remove --hostname-override from kubelet service file
  element8:
    name: 8-Character Password
    requirements:
    - Best practice implementation
    - Includes, at a minimum, an 8-character password for accounts using MFA
    - 4.4 Use Unique Passwords v7
    - Where multi-factor authentication is not supported, accounts will use passwords
      that are unique to that system
    audit:
    - Review users who have create access to pod objects in the Kubernetes API
    - 'Remediation: Where possible, remove create access to pod objects in the cluster'
    - 'Default Value: By default, the following list of principals have create privileges
      on pod objects'
    remediation:
    - Remove create access to pod objects in the cluster
    - 'Default Value: By default, the following list of principals have create privileges
      on pod objects'
    automatic_remediation:
    - 'kubectl patch serviceaccount default -p $''automountServiceAccountToken: false'''
  element9:
    name: system:masters
    requirements:
    - unrestricted access to Kubernetes API hard-coded into the API server source
      code.
    - authenticated user who is a member of this group cannot have their access reduced.
    - combined with client certificate authentication, use of this group can allow
      for irrevocable cluster-admin level credentials to exist for a cluster.
    - Impact: RBAC system should not be specifically required, as ordinary bindings
        from principals to the cluster-admin cluster role can be made.
    - Audit: Review all credentials with access to cluster roles or roles providing
        the impersonate, bind or escalate privileges.
    - Remediation: Remove the system:masters group from all users in the cluster.
    - Default Value: By default, some clusters will create a "break glass" client
        certificate which is a member of this group.
    - Access to this client certificate should be carefully controlled and it should
      not be used for general cluster operations.
    - References:
      - https://github.com/kubernetes/kubernetes/blob/master/pkg/registry/rbac/escalation_check.go#L38
      - Page 78
  element10:
    name: Image Scanning Configuration
    requirements:
    - Scan Images Being Deployed
    - Scan Images for Vulnerabilities
    - Configure Scan On Push
    - Configure Scan on Unauthenticated
  element11:
    name: Automated Vulnerability Scans
    requirements:
    - Perform scans on a monthly, or more frequent basis.
    - Run Automated Vulnerability Scanning Tools v7
    - Utilize an up-to-date SCAP-compliant vulnerability scanning tool
  element12:
    name: Dedicated Administrator Account v8
    requirements:
    - Restrict administrator privileges to dedicated administrator accounts on enterprise
      assets.
    - Restrict administrator privileges to dedicated administrator accounts on enterprise
      assets.
    - "Conduct general computing activities, such as internet browsing, email, and\
      \ productivity suite use, from the user\u2019s primary, non-privileged account."
    - "Conduct general computing activities, such as internet browsing, email, and\
      \ productivity suite use, from the user\u2019s primary, non-privileged account."
    - Ensure the Use of Dedicated Administrative Accounts v7
    - "Ensure that all users with administrative account access use a dedicated or\
      \ \u25CF \u25CF \u25CF secondary account for elevated activities. This account\
      \ should only be used for administrative activities and not internet browsing,\
      \ email, or similar activities."
    - Minimize Container Registries to only those approved (Manual) Profile Applicability
    - Use approved container registries.
    - Allowlist Authorized Cloud Storage or Email Providers
    - Prefer using dedicated EKS Service Accounts (Manual) Profile Applicability
    - Kubernetes workloads should not use cluster node service accounts to authenticate
      to Amazon EKS APIs. Each Kubernetes workload that needs to authenticate to other
      AWS services using AWS IAM should be provisioned with a dedicated Service account.
    - With IAM roles for service accounts on Amazon EKS clusters, you can associate
      an IAM role with a Kubernetes service account. This service account can then
      provide AWS permissions to the containers in any pod that uses that service
      account.
    - Applications must sign their AWS API requests with AWS credentials.
    - "The IAM roles for service accounts feature provides the following benefits:\
      \ \u2022 Least privilege \u2014 By using the IAM roles for service accounts\
      \ feature, you no longer need to provide extended permissions to the worker\
      \ node IAM role so that pods on that node can call AWS APIs."
  element13:
    name: Establish and Maintain Dedicated Computing Resources for All Administrative
      Work
    requirements:
    - Establish and maintain dedicated computing resources, either physically or logically
      separated, for all administrative tasks or tasks requiring administrative access.
    - The computing resources should be segmented from the enterprise's primary network
      and not be allowed internet access.
    - Ensure that all users with administrative account access use a dedicated or
      secondary account for elevated activities.
  element14:
    name: Ensure that all users with administrative account access use a dedicated
      or secondary account for elevated activities.
    requirements:
    - Use a dedicated or secondary account for elevated activities.
    - Use AWS Key Management Service (KMS) Customer Managed Keys (CMK).
    - Enable encryption provider support during EKS cluster creation.
  element15:
    name: Ensure that all users with administrative account access use a dedicated
      or secondary account for elevated activities.
    requirements:
    - Enable 'Secrets Encryption' during Amazon EKS cluster creation.
    - Use AWS Key Management Service (KMS) Customer Managed Keys (CMK).
    - Use envelope encryption of Kubernetes secrets stored in Amazon EKS.
  element16:
    name: Ensure that all users with administrative account access use a dedicated
      or secondary account for elevated activities.
    requirements:
    - Implement envelope encryption of Kubernetes secrets stored in Amazon EKS.
    - Use AWS Key Management Service (KMS) Customer Managed Keys (CMK).
    - Enable 'Secrets Encryption' during Amazon EKS cluster creation.
  element17:
    name: Ensure that all users with administrative account access use a dedicated
