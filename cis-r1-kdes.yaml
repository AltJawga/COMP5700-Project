chain_of_thought_kdes:
  element1:
    name: Establish Secure Configurations
    requirements:
    - CIS Control v7
  element2:
    name: Control Plane Security
    requirements:
    - Security is a shared responsibility between AWS and the Amazon EKS customer.
    - "Security of the cloud \u2013 AWS is responsible for protecting the infrastructure\
      \ that runs AWS services in the AWS Cloud."
    - "Security in the cloud \u2013 Your responsibility includes the following areas."
    - Amazon EKS follows the shared responsibility model for CVEs and security patches
      on managed node groups.
    - Because managed nodes run the Amazon EKS-optimized AMIs, Amazon EKS is responsible
      for building patched versions of these AMIs when bugs or issues are reported
      and we are able to publish a fix.
    - However, customers are responsible for deploying these patched AMI versions
      to your managed node groups.
    - Other associated application software: Setting up and managing network controls,
        such as firewall rules o Managing platform-level identity and access management,
        either with or in addition to IAM
  element3:
    name: Restrict kubelet configuration file permissions
    requirements:
    - Restrict the kubelet configuration file to 644 or more restrictive permissions.
  element4:
    name: Disable Anonymous Authentication
    requirements:
    - Disable anonymous requests to the Kubelet server.
    - "Configure data access control lists (ACLs) based on a user\u2019s need to know."
  element5:
    name: Disable Dormant Accounts
    requirements:
    - Do not allow all authenticated requests. Enable explicit authorization.
    - Restrict this behavior and only allow explicitly authorized requests.
    - 'Audit Method 1: Kubelets can accept configuration via a configuration file
      and in some cases via command line arguments.'
    - 'Audit Method 2: It is also possible to review the running configuration of
      a Kubelet via the /configz endpoint of the Kubernetes API.'
    - Verify that Webhook Authentication is enabled.
    - Verify that the Authorization Mode is set to Webhook.
    - 'Remediation Method 1: If configuring via the Kubelet config file, you first
      need to locate the file. To do this, SSH to each node and execute the following
      command to find the kubelet process: ps -ef | grep kubelet The output of the
      above command provides details of the active kubelet process, from which we
      can see the location of the configuration file provided to the kubelet service
      with the --config argument.'
    - 'Remediation Method 2: If using executable arguments, edit the kubelet service
      file on each worker node and ensure the below parameters are part of the KUBELET_ARGS
      variable string. For systems using systemd, such as the Amazon EKS Optimised
      Amazon Linux or Bottlerocket AMIs, then this file can be found at /etc/systemd/system/kubelet.service.d/10-kubelet-args.conf.
      Otherwise, you may need to look up documentation for your chosen operating system
      to determine which service manager is configured: --authentication-token-webhook
      --authorization-mode=Webhook'
    - 'Remediation Method 2: If using executable arguments, edit the kubelet service
      file on each worker node and ensure the below parameters are part of the KUBELET_ARGS
      variable string. For systems using systemd, such as the Amazon EKS Optimised
      Amazon Linux or Bottlerocket AMIs, then this file can be found at /etc/systemd/system/kubelet.service.d/10-kubelet-args.conf.
      Otherwise, you may need to look up documentation for your chosen operating system
      to determine which service manager is configured: systemctl daemon-reload systemctl
      restart kubelet.service systemctl status kubelet -l Default Value: See the EKS
      documentation for the default value.'
    - 'Remediation Method 2: If using executable arguments, edit the kubelet service
      file on each worker node and ensure the below parameters are part of the KUBELET_ARGS
      variable string. For systems using systemd, such as the Amazon EKS Optimised
      Amazon Linux or Bottlerocket AMIs, then this file can be found at /etc/systemd/system/kubelet.service.d/10-kubelet-args.conf.
      Otherwise, you may need to look up documentation for your chosen operating system
      to determine which service manager is configured: systemctl daemon-reload systemctl
      restart kubelet.service systemctl status kubelet -l Default Value: See the EKS
      documentation for the default value.'
  element6:
    name: Kubelet Certificate Authentication
    requirements:
    - Ensure Kubelet server certificate is verified.
    - Prevent man-in-the-middle attacks via insecure connections.
    - Enable Kubelet certificate authentication.
    - Disable the read-only port.
  element7:
    name: Use secure network management and communication protocols (e.g., 802.1X,
      Wi-Fi Protected Access 2 (WPA2) Enterprise or greater).
    requirements:
    - Use secure network management and communication protocols (e.g., 802.1X, Wi-Fi
      Protected Access 2 (WPA2) Enterprise or greater).
  element8:
    name: Event Record QPS
    requirements:
    - Limit event capture rate to prevent denial of service
    - Set --eventRecordQPS to a level appropriate for the cluster
    - Ensure sufficient event processing and storage capacity
    verification:
    - Check Kubelet process status on each node
    - Verify --eventRecordQPS parameter is set to 0 or a suitable level
    - Monitor event processing and storage system performance
  element9:
    name: Secure Images
    requirements:
    - Maintain secure images or templates for all systems in the enterprise based
      on v7 the organization's approved configuration standards.
    - Any new system deployment or existing system that becomes compromised should
      be imaged using one of those images or templates.
  element10:
    name: Password Best Practices
    requirements:
    - 4.4
    - 4.1
    - 4.7
    - 4.1.5
    - 4.3
    - 4.8
  element11:
    name: AdministrativeAccountAccessRestriction
    requirements:
    - Do not generally permit containers to be run with the hostPID flag set to true.
    - Ensure that all users with administrative account access use a dedicated or
      secondary account for elevated activities.
    - Do not generally permit containers to be run with the hostIPC flag set to true.
    - Ensure that all users with administrative account access use a dedicated or
      secondary account for elevated activities.
    - Do not generally permit containers to be run with the hostNetwork flag set to
      true.
    - Ensure that all users with administrative account access use a dedicated or
      secondary account for elevated activities.
  element12:
    name: Restrict Administrator Privileges to Dedicated Administrator Accounts
