  element24:
    name: Kubelet Process
    requirements:
    - ps -ef | grep kubelet
    - The output of the above command provides details of the active Kubelet process,
      from which we can see the command line arguments provided to the process.
    - The location of the configuration file, provided with the --config argument,
      as this will be needed to verify configuration.
    - 'The file can be viewed with a command such as more or less, like so: less /path/to/kubelet-config.json'
    - Verify that Anonymous Authentication is not enabled.
    - 'This may be configured as a command line argument to the kubelet service with
      --anonymous-auth=false or in the kubelet configuration file via "authentication":
      { "anonymous": { "enabled": false } }'
    - 'Remediation: Remediation Method 1: If configuring via the Kubelet config file,
      you first need to locate the file. To do this, SSH to each node and execute
      the following command to find the kubelet process: ps -ef | grep kubelet The
      output of the above command provides details of the active kubelet process,
      from which we can see the location of the configuration file provided to the
      kubelet service with the --config argument. The file can be viewed with a command
      such as more or less, like so: sudo less /path/to/kubelet-config.json'
    - 'Remediation Method 2: If using executable arguments, edit the kubelet service
      file on each worker node and ensure the below parameters are part of the KUBELET_ARGS
      variable string. For systems using systemd, such as the Amazon EKS Optimised
      Amazon Linux or Bottlerocket AMIs, then this file can be found at /etc/systemd/system/kubelet.service.d/10-kubelet-args.conf.
      Otherwise, you may need to look up documentation for your chosen operating system
      to determine which service manager is configured: "authentication": { "anonymous":
      { "enabled": false } }'
    - 'Disable Anonymous Authentication by setting the following parameter: Page 38
      Internal Only - General "authentication": { "anonymous": { "enabled": false
      } }'
    - 'For Both Remediation Steps: Based on your system, restart the kubelet service
      and check the service status. The following example is for operating systems
      using systemd, such as the Amazon EKS Optimised Amazon Linux or Bottlerocket
      AMIs, and invokes the systemctl command. If systemctl is not available then
      you will need to look up documentation for your chosen operating system to determine
      which service manager is configured: systemctl daemon-reload systemctl restart
      kubelet.service systemctl status kubelet -l Default Value: See the EKS documentation
      for the default value.'
    - "References: 1. https://kubernetes.io/docs/reference/command-line-tools-reference/kubelet/\
      \ 2. https://kubernetes.io/docs/reference/access-authn-authz/kubelet-authn-\
      \ authz/#kubelet-authentication 3. https://kubernetes.io/docs/reference/config-api/kubelet-config.v1beta1/\
      \ CIS Controls: Controls Control IG 1 IG 2 IG 3 Version 5.3 Disable Dormant\
      \ Accounts v8 Delete or disable any dormant accounts after a period of 45 days\
      \ of inactivity, \u25CF \u25CF \u25CF"
    - "14.6 Protect Information through Access Control Lists Protect all information\
      \ stored on systems with file system, network share, v7 claims, application,\
      \ or database specific access control lists. These controls will \u25CF \u25CF\
      \ \u25CF enforce the principle that only authorized individuals should have\
