  element6:
    name: anonymous_access
    requirements:
    - ensure_anonymous_authentication
    audit_method: Kubelets can accept configuration via a configuration file and in
      some cases via command line arguments. It is important to note that parameters
      provided as command line arguments will override their counterpart parameters
      in the configuration file (see -- config details in the Kubelet CLI Reference
      for more info, where you can also find out which configuration parameters can
      be supplied as a command line argument).
  element7:
    name: Client Certificate Authority File
    requirements:
    - configured via a command line argument to the kubelet service with --client-ca-file
    - 'configured in the kubelet configuration file via ''authentication'': { ''x509'':
      { ''clientCAFile'': ''<path/to/client-ca-file>'' }}'
