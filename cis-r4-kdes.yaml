few_shot_kdes:
  element1:
    name: API Rate Limiting
    requirements:
    - All external-facing APIs must implement rate limiting.
    - CIS Build Kits, or internally developed remediation methods should never be
      applied to production systems without proper testing.
  element2:
    name: API Rate Limiting
    requirements:
    - All external-facing APIs must implement rate limiting.
    - User authentication will be handled via OAuth 2.0.
    - Data at rest must be encrypted using AES-256.
  element3:
    name: Audit Log Management Process
    requirements:
    - Establish and maintain an audit log management process that defines the v8
    - "Collect audit logs. Ensure that logging, per the enterprise\u2019s audit log\
      \ management process, has been enabled across enterprise assets."
    - Ensure that local logging has been enabled on all systems and networking devices.
