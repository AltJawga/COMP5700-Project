    - Implement envelope encryption of Kubernetes secrets
    - Using this functionality, you can use a key, that you manage in AWS KMS, to
      encrypt data at the application layer.
    remediation: This process can only be performed during Cluster Creation. Enable
      'Secrets Encryption' during Amazon EKS cluster creation as described in the
      links within the 'References' section.
    default_value: By default secrets created using the Kubernetes API are stored
      in tmpfs and are encrypted at rest.
    references:
    - https://aws.amazon.com/about-aws/whats-new/2020/03/amazon-eks-adds- envelope-encryption-for-secrets-with-aws-kms/
    - https://docs.aws.amazon.com/eks/latest/APIReference/API_DescribeCluster.html
