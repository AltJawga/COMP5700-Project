zero_shot_kdes:
  element1:
    name: CIS Controls v7
    requirements:
    - Implement a robust logging and monitoring system to detect and respond to security
      incidents.
    - Enforce multi-factor authentication (MFA) for all critical systems and applications.
    - Regularly patch and update operating systems and applications with the latest
      security fixes.
    - Implement a vulnerability management program to identify and remediate vulnerabilities.
    - Conduct regular security assessments and penetration testing to identify weaknesses
      in the system.
    - Implement a strong password policy and enforce password complexity requirements.
    - Implement a data loss prevention (DLP) solution to protect sensitive data.
    - Implement a secure configuration management process to ensure consistent and
      secure configurations.
  element2:
    name: Establish Secure Configurations
    requirements:
    - Establish Secure Configurations
    - Implement Secure Configurations
  element3:
    name: API Server Audit Logs
    requirements:
    - Enabled
    - Enabled
    - Enabled
    - Enabled
    - Enabled
    references:
    - https://kubernetes.io/docs/tasks/debug-application-cluster/audit/
    - https://aws.github.io/aws-eks-best-practices/detective/
    - https://docs.aws.amazon.com/eks/latest/userguide/control-plane-logs.html
    - https://docs.aws.amazon.com/eks/latest/userguide/logging-using-cloudtrail.html
  element4:
    name: Control Plane Audit Logs
    requirements:
    - Enabled
    - Enabled
    - Enabled
    - Enabled
    - Enabled
    references:
    - https://aws.github.io/aws-eks-best-practices/detective/
    - https://docs.aws.amazon.com/eks/latest/userguide/control-plane-logs.html
    - https://docs.aws.amazon.com/eks/latest/userguide/logging-using-cloudtrail.html
  element5:
    name: Audit Log Management Process
    requirements:
    - Establish and Maintain an Audit Log Management Process
    - Address the collection, review, and retention of audit logs for enterprise assets
    - Review and update documentation annually, or when significant enterprise changes
      occur that could impact this
    - Safeguard
    references:
    - https://kubernetes.io/docs/tasks/debug-application-cluster/audit/
    - https://aws.github.io/aws-eks-best-practices/detective/
    - https://docs.aws.amazon.com/eks/latest/userguide/control-plane-logs.html
