  element18:
    name: Cluster Service Account with Storage Object Viewer Role
    requirements:
    - Restrict Administrator Privileges to Dedicated Administrator Accounts
    - "Restrict administrator privileges to dedicated administrator accounts on \u25CF\
      \ \u25CF \u25CF enterprise assets."
    - "Conduct general computing activities, such as internet browsing, email, and\
      \ productivity suite use, from the user\u2019s primary, non-privileged account."
    - Ensure that all users with administrative account access use a dedicated or
      secondary account for elevated activities.
    - Minimize cluster access to read-only for Amazon ECR (Manual) Profile Applicability
    - Use approved container registries.
    - 'Define your approval criteria: Determine the criteria that containers must
      meet to be considered approved.'
    - 'Identify all existing ECR registries: Identify all ECR registries that are
      currently being used in your organization.'
    - 'Evaluate ECR registries against approval criteria: Evaluate each ECR registry
      against your approval criteria to determine whether it should be approved or
      not.'
    - 'Establish policies and procedures: Establish policies and procedures that outline
      how ECR registries will be approved, maintained, and monitored.'
    - 'Implement access controls: Implement access controls to ensure that only approved
      ECR registries are used to store and distribute container images.'
  element19:
    name: ECR Registries
    requirements:
    - Continue to meet your approval criteria
    - Page 122 Internal Only - General regularly reviewing access logs, scanning for
      vulnerabilities, and conducting periodic audits.
    - By following these steps, you can minimize AWS ECR container registries to only
      those approved
    - AWS provides several tools and services that can help you manage your ECR registries
    - AWS Config, AWS CloudFormation, and AWS Identity and Access Management (IAM)
    - 'Default Value: Container registries are not restricted by default and Kubernetes
      assumes your default CR is Docker Hub.'
    - 'References: 1. https://aws.amazon.com/blogs/opensource/using-open-policy-agent-on-amazon-eks/
      CIS Controls: Controls Control IG 1 IG 2 IG 3 Version 2.5'
  element20:
    name: Identity and Access Management (IAM)
    requirements:
    - Prefer using dedicated EKS Service Accounts (Automated)
    - "Profile Applicability: \u2022 Level 1"
    - 'Description: Kubernetes workloads should not use cluster node service accounts
      to authenticate to Amazon EKS APIs.'
    - 'Rationale: Manual approaches for authenticating Kubernetes workloads running
      on Amazon EKS against AWS APIs are...'
    - 'Audit: For each namespace in the cluster, review the rights assigned to the
      default service account and ensure that it has no roles or cluster roles bound
      to it apart from the defaults.'
    - 'Additionally ensure that the automountServiceAccountToken: false setting is
      in place for each default service account.'
    - 'Remediation: With IAM roles for service accounts on Amazon EKS clusters, you
      can associate an IAM role with a Kubernetes service account. This service account
      can then provide AWS permissions to the containers in any pod that uses that
      service account.'
    - "The IAM roles for service accounts feature provides the following benefits:\
      \ \u2022 Least privilege \u2014 By using the IAM roles for service accounts\
      \ feature, you no longer need to provide extended permissions to the worker\
      \ node IAM role so that..."
    - Applications must sign their AWS API requests with AWS credentials.
    - "The IAM roles for service accounts feature provides the following benefits:\
      \ \u2022 Least privilege \u2014 By using the IAM roles for service accounts\
      \ feature, you no longer need to provide extended permissions to the worker\
      \ node IAM role so that..."
    - " \u2022 Credential isolation \u2014 A container can only retrieve credentials\
      \ for the IAM role that is associated with the service account to which it belongs.\
      \ A container never has access to credentials that are intended for another\
      \ container that belongs to another pod."
    - " \u2022 Audit-ability \u2014 Access and event logging is available through\
      \ CloudTrail to help ensure retrospective auditing."
    - To get started, see list text hereEnabling IAM roles for service accounts on
      your cluster.
    - 'For an end-to-end walkthrough using eksctl, see Walkthrough: Updating a DaemonSet
      to use IAM for service accounts.'
    - 'References: 1. https://docs.aws.amazon.com/eks/latest/userguide/iam-roles-for-service-accounts.html
      2. https://docs.aws.amazon.com/eks/latest/userguide/iam-roles-for-service-accounts-cni-walkthrough.html
      3. https://aws.github.io/aws-eks-best-practices/security/docs/iam/#scope-the-iam-
      role-trust-policy-for-irsa-to-the-service-account-name'
