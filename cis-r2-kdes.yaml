chain_of_thought_kdes:
  element1:
    name: Encryption at Rest
    requirements:
    - Enable audit logs for Kubernetes components
    - Ensure that all options are set to 'Enabled'
    - Verify that if a file is specified and it exists, the permissions are 644 or
      more restrictive
  element2:
    name: Configure Data Access Control Lists
    requirements:
    - "Based on a user\u2019s need to know"
    - "Implement data \u25CF \u25CF \u25CF access control lists"
  element3:
    name: Cluster Access Manager API
    requirements:
    - Simplified Access Management
    - Enhanced Security Controls
    - Improved Visibility and Auditing
    - Faster and Safer Access Provisioning
    - Future-Proofing and Alignment with AWS Best Practices
  element4:
    name: Cluster Access Control
    requirements:
    - 'Audit: Review user access to cluster roles and roles with impersonate, bind,
      and escalate permissions.'
    - 'Audit: Review users who have access to cluster roles or roles that provide
      the impersonate, bind, or escalate privileges.'
    - 'Audit: Review the users who have access to cluster roles or roles which provide
      the escalate privilege.'
    - 'Audit: Review the users who have access to cluster roles or roles which provide
      the allowPrivilegeEscalation.'
  element5:
    name: Restrict Administrator Privileges
    requirements:
    - Implement and Manage Dedicated Administrative Accounts
    - Ensure that all users with administrative account access use a dedicated or
      secondary account for elevated activities.
    - Implement and Maintain Automated Application Patch Management
    - Perform application updates on enterprise assets through automated patch management.
    - Perform application updates on enterprise assets through automated patch management.
  element6:
    name: Secure Configurations
    requirements:
    - Establish and Maintain Dedicated Computing Resources for All Administrative
      Work
    - "Conduct general computing activities, such as internet browsing, email, and\
      \ productivity suite use, from the user\u2019s primary, non-privileged account."
    - Perform application updates on enterprise assets through automated patch management.
  element7:
    name: Implement and Manage a Firewall on Servers
    requirements:
    - Implement and manage a firewall on servers, where supported.
    - Segment the network based on sensitivity
    - "Segment the network based on the label or classification level of the \u25CF\
      \ \u25CF information stored on the servers, locate all sensitive information\
      \ on separated Virtual Local Area Networks (VLANs)."
    - "Segment the network based on the label or classification level of the \u25CF\
      \ \u25CF information stored on the servers, locate all sensitive information\
      \ on separated Virtual Local Area Networks (VLANs)."
  element8:
    name: Encrypt Sensitive Data in Transit
    requirements:
    - Encrypt sensitive data in transit.
    - Encrypt sensitive data at rest using a tool that requires a secondary authentication
      mechanism not integrated into the operating system, in order to access the information.
  element9:
    name: Perform Automated Vulnerability Scans of Internal Enterprise Assets
    requirements:
    - Perform automated vulnerability scans of internal enterprise assets on a monthly,
      or more frequent, basis.
    - Perform automated vulnerability scans of externally-exposed enterprise assets
      on a monthly, or more frequent, basis.
  element10:
    name: Run Automated Vulnerability Scanning Tools
    requirements:
    - "Utilize an up-to-date SCAP-compliant vulnerability scanning tool to automatically\
      \ scan all systems on the network on a weekly or more frequent basis to identify\
      \ all potential vulnerabilities on the organization\u2019s systems."
    - "Utilize an up-to-date SCAP-compliant vulnerability scanning tool to automatically\
      \ scan all systems on the network on a weekly or more frequent basis to identify\
      \ all potential vulnerabilities on the organization\u2019s systems."
  element11:
    name: Minimize User Access to Amazon ECR
    requirements:
    - Minimize user access to Amazon ECR.
    - Restrict user access to Amazon ECR, limiting interaction with build images to
      only authorized personnel and service accounts.
  element12:
    name: Restrict Administrator Privileges to Dedicated Administrator Accounts
    requirements:
    - "Restrict administrator privileges to dedicated administrator accounts on \u25CF\
      \ \u25CF \u25CF enterprise assets."
    - "Conduct general computing activities, such as internet browsing, email, and\
      \ productivity suite use, from the user\u2019s primary, non-privileged account."
    - "Ensure that all users with administrative account access use a dedicated or\
      \ \u25CF \u25CF \u25CF secondary account for elevated activities."
    - Allowlist authorized container registries.
    - Establish and maintain dedicated computing resources, either physically or logically
      separated, for all administrative tasks or tasks requiring administrative access.
  element13:
    name: Encryption at Rest
    requirements:
    - Prefer using dedicated EKS Service Accounts
    - Enable and set as appropriate
    - Audit Logs
    - Image Scanning
    - Cluster Access Manager API
    - Streamline and enhance management of access controls
